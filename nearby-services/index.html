<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NearFind — Nearby Services</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-shell">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                </div>
                <span class="brand-name">NearFind</span>
            </div>

            <div class="locate-section">
                <button id="locateBtn" class="locate-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>
                    <span class="btn-text">Detect My Location</span>
                </button>

                <div class="radius-control">
                    <label>Search Radius</label>
                    <div class="radius-options">
                        <button class="radius-btn" data-value="500">500m</button>
                        <button class="radius-btn active" data-value="1000">1 km</button>
                        <button class="radius-btn" data-value="2000">2 km</button>
                        <button class="radius-btn" data-value="5000">5 km</button>
                    </div>
                </div>
            </div>

            <div class="categories-section">
                <div class="section-label">Categories</div>
                <div class="category-list">
                    <button class="cat-btn active" data-category="all">
                        <span class="cat-icon">◈</span>
                        <span>All Places</span>
                        <span class="cat-count" id="count-all">—</span>
                    </button>
                    <button class="cat-btn" data-category="hospital">
                        <span class="cat-icon">✚</span>
                        <span>Hospitals</span>
                        <span class="cat-count" id="count-hospital">—</span>
                    </button>
                    <button class="cat-btn" data-category="restaurant">
                        <span class="cat-icon">◉</span>
                        <span>Restaurants</span>
                        <span class="cat-count" id="count-restaurant">—</span>
                    </button>
                    <button class="cat-btn" data-category="fuel">
                        <span class="cat-icon">◈</span>
                        <span>Petrol Pumps</span>
                        <span class="cat-count" id="count-fuel">—</span>
                    </button>
                    <button class="cat-btn" data-category="pharmacy">
                        <span class="cat-icon">✦</span>
                        <span>Medical Stores</span>
                        <span class="cat-count" id="count-pharmacy">—</span>
                    </button>
                    <button class="cat-btn" data-category="shop">
                        <span class="cat-icon">□</span>
                        <span>Shops</span>
                        <span class="cat-count" id="count-shop">—</span>
                    </button>
                    <button class="cat-btn" data-category="atm">
                        <span class="cat-icon">$</span>
                        <span>ATMs / Banks</span>
                        <span class="cat-count" id="count-atm">—</span>
                    </button>
                    <button class="cat-btn" data-category="school">
                        <span class="cat-icon">◎</span>
                        <span>Schools</span>
                        <span class="cat-count" id="count-school">—</span>
                    </button>
                </div>
            </div>

            <div class="info-box">
                <div class="info-title">Powered by</div>
                <div class="info-items">
                    <span>OpenStreetMap</span>
                    <span>Overpass API</span>
                    <span>Leaflet.js</span>
                </div>
                <div class="info-note">100% Free · No API Key</div>
            </div>
        </aside>

        <!-- Main content -->
        <main class="main">
            <!-- Status bar -->
            <div id="statusBar" class="status-bar hidden">
                <div class="status-inner">
                    <div class="status-icon" id="statusIcon"></div>
                    <span id="statusText"></span>
                </div>
            </div>

            <!-- Map -->
            <div id="map"></div>

            <!-- Results drawer -->
            <div class="results-drawer" id="resultsDrawer">
                <div class="drawer-header">
                    <div class="drawer-title">
                        <span id="drawerTitle">Nearby Places</span>
                        <span class="result-count" id="resultCount">0 found</span>
                    </div>
                    <button class="drawer-toggle" id="drawerToggle">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
                    </button>
                </div>
                <div class="drawer-body" id="drawerBody">
                    <div class="empty-state" id="emptyState">
                        <div class="empty-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                        </div>
                        <p>Click <strong>Detect My Location</strong> to find nearby services</p>
                    </div>
                    <div class="results-grid" id="resultsList"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/categories.js"></script>
    <script src="js/overpass.js"></script>
    <script src="js/map.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
